<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeacherFlow AI - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>

    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Admin -->
    <button class="admin-login" onclick="window.location.href='/admin'">Admin Login</button>

    <div class="app-container">
        <!-- Selection Panel -->
        <div class="panel selection-panel" id="selectionPanel">
            <div class="selection-content">
                <h1 class="brand-title">TeacherFlow AI</h1>
                <p class="brand-subtitle">Select your role to continue</p>
                
                <div class="roles-container">
                    <div class="role-card" id="teacherCard" onclick="selectRole('teacher')">
                        <div class="role-icon">👨‍🏫</div>
                        <h2>Teacher</h2>
                        <p>Access class insights and analytics</p>
                    </div>

                    <div class="role-card" id="studentCard" onclick="selectRole('student')">
                        <div class="role-icon">🎓</div>
                        <h2>Student</h2>
                        <p>Track your learning and performance</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Login Panel -->
        <div class="panel login-panel" id="loginPanel">
            <div class="glass-panel">
                <button class="back-btn" onclick="resetSelection()">← Back</button>
                <div class="login-header">
                    <h2 id="loginTitle">Welcome</h2>
                    <p id="loginSubtitle">Please enter your details</p>
                </div>

                <form class="login-form" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="hello@teacherflow.ai" required />
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required />
                    </div>
                    
                    <div class="form-actions">
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script src="src/js/main.js"></script>
</body>
</html>
