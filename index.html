<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeacherFlow AI - Enter</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>
    <!-- Full-screen particle canvas -->
    <canvas id="particleCanvas"></canvas>

    <div class="split-layout">
        <!-- Left Hero Section -->
        <div class="hero-section">
            <div class="hero-content">
                <div class="hero-branding">
                    <h1 class="brand-title">TeacherFlow AI</h1>
                    <div class="typing-container">
                        <span id="typing-text"></span><span class="cursor">|</span>
                    </div>
                </div>

                <div class="hero-carousel">
                    <img class="carousel-slide" src="https://images.unsplash.com/photo-1620712943543-bcc4638d9f8d?q=80&w=800" alt="Slide 1">
                    <img class="carousel-slide" src="https://images.unsplash.com/photo-1551288049-bbda4833effb?q=80&w=800" alt="Slide 2">
                    <img class="carousel-slide" src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?q=80&w=800" alt="Slide 3">
                </div>
            </div>
        </div>

        <!-- Right Action Section -->
        <div class="action-section">
            <button class="admin-login" onclick="window.location.href='admin.html'">Admin Enter</button>

            <!-- Selection Panel -->
            <div class="panel selection-panel" id="selectionPanel">
                <div class="selection-content">
                    <h2 class="section-title">Select your role</h2>
                    
                    <div class="roles-container">
                        <div class="role-card teacher-theme" id="teacherCard" onclick="selectRole('teacher')" onmouseenter="startParticles(event, '#d4af37')" onmouseleave="stopParticles()">
                            <div class="role-image-container">
                                <img src="https://images.unsplash.com/photo-1544717297-fa154daaf76e?auto=format&fit=crop&q=80&w=400" alt="Teacher" class="role-image">
                            </div>
                            <h3>Teacher</h3>
                            <p>Access class insights and analytics</p>
                        </div>

                        <div class="role-card student-theme" id="studentCard" onclick="selectRole('student')" onmouseenter="startParticles(event, '#64748b')" onmouseleave="stopParticles()">
                            <div class="role-image-container">
                                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&q=80&w=400" alt="Student" class="role-image">
                            </div>
                            <h3>Student</h3>
                            <p>Track your learning and performance</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Login Panel (Overlays Right Side) -->
            <div class="panel login-panel" id="enterPanel">
                <div class="glass-panel">
                    <button class="back-btn" onclick="resetSelection()">← Back</button>
                    <div class="login-header">
                        <h2 id="enterTitle">Welcome</h2>
                        <p id="enterSubtitle">Please enter your details</p>
                    </div>

                    <div class="login-form">
                        <div class="input-group">
                            <span class="input-label">Identifier</span>
                            <input type="text" autocomplete="off" spellcheck="false" placeholder="hello@teacherflow.ai" />
                        </div>
                        <div class="input-group">
                            <span class="input-label">Passcode</span>
                            <input type="text" autocomplete="off" spellcheck="false" placeholder="••••••••" style="-webkit-text-security: disc;" />
                        </div>
                        
                        <div class="form-actions">
                            <a href="#" class="forgot-password">Forgot Passcode?</a>
                        </div>

                        <button type="button" class="login-btn" id="enterBtn" onclick="handleLogin(event)">Enter</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="src/js/main.js"></script>
    <script>
        // ── TYPING EFFECT ──
        const phrases = [
            "Catching Learning Gaps Early", 
            "Empowering Educators", 
            "AI-Powered Analytics", 
            "Preventing Fragmented Knowledge"
        ];
        let currentPhraseIdx = 0;
        let currentCharIdx = 0;
        let isDeleting = false;
        const typingTextEl = document.getElementById('typing-text');
        
        function typeEffect() {
            const currentPhrase = phrases[currentPhraseIdx];
            
            if (isDeleting) {
                typingTextEl.textContent = currentPhrase.substring(0, currentCharIdx - 1);
                currentCharIdx--;
            } else {
                typingTextEl.textContent = currentPhrase.substring(0, currentCharIdx + 1);
                currentCharIdx++;
            }

            let typeSpeed = isDeleting ? 40 : 80;

            if (!isDeleting && currentCharIdx === currentPhrase.length) {
                typeSpeed = 2000; // Pause at end of word
                isDeleting = true;
            } else if (isDeleting && currentCharIdx === 0) {
                isDeleting = false;
                currentPhraseIdx = (currentPhraseIdx + 1) % phrases.length;
                typeSpeed = 400; // Pause before typing new word
            }

            setTimeout(typeEffect, typeSpeed);
        }
        
        // ── CAROUSEL EFFECT ──
        let currentSlide = 0;
        const slides = Array.from(document.querySelectorAll('.carousel-slide'));
        const loadedSlides = new Set();

        slides.forEach((slide, index) => {
            if (slide.complete && slide.naturalWidth > 0) {
                loadedSlides.add(index);
            } else {
                slide.addEventListener('load', () => {
                    loadedSlides.add(index);
                    if (!document.querySelector('.carousel-slide.active') && loadedSlides.has(0)) {
                        currentSlide = 0;
                        slides[0].classList.add('active');
                    }
                }, { once: true });

                slide.addEventListener('error', () => {
                    loadedSlides.add(index);
                }, { once: true });
            }
        });

        if (loadedSlides.has(0)) {
            slides[0].classList.add('active');
        }

        function nextSlide() {
            if (!slides.length) return;
            let attempts = 0;
            let next = currentSlide;

            do {
                next = (next + 1) % slides.length;
                attempts++;
            } while (attempts <= slides.length && !loadedSlides.has(next));

            if (!loadedSlides.has(next)) return;

            slides[currentSlide].classList.remove('active');
            currentSlide = next;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, 4000);

        // ── PARTICLE EFFECT ──
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let particleInterval;
        let isHovering = false;
        let hoverTarget = null;
        let particleColor = '#ffffff';

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor(x, y, color) {
                this.x = x + (Math.random() * 80 - 40);
                this.y = y + (Math.random() * 80 - 40);
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * -2 - 1;
                this.color = color;
                this.life = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
                if (this.size > 0.1) this.size -= 0.05;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function startParticles(e, color) {
            isHovering = true;
            hoverTarget = e.currentTarget;
            particleColor = color;
            createParticles();
        }

        function stopParticles() {
            isHovering = false;
            hoverTarget = null;
        }

        function createParticles() {
            if (!isHovering || !hoverTarget) return;
            const rect = hoverTarget.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(centerX, centerY, particleColor));
            }
            setTimeout(createParticles, 50);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // Initialize Effects
        typeEffect();
        animateParticles();
    </script>
</body>
</html>
